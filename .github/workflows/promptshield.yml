name: PromptShield

# Gate every PR: scan the code your coding agent will read for hidden
# prompt-injection instructions. A HIGH finding fails the check (exit 1).
#
# Drop this file into any repo's .github/workflows/ to wire it up.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # Required to upload SARIF findings to the repo's Security → Code scanning tab.
  security-events: write

jobs:
  scan:
    name: prompt-injection scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so --diff against the base ref works on PRs.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PromptShield
        run: pip install -e .

      # On a pull request, scan only the changed surfaces against the base ref.
      - name: Scan PR diff
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          promptshield scan --diff "origin/${{ github.base_ref }}"

      # On push to main, scan the whole tree.
      - name: Scan repository
        if: github.event_name != 'pull_request'
        run: promptshield scan .

      # --- Code-scanning upload (additive) -------------------------------------
      # Emit a SARIF 2.1.0 log and upload it so findings land in the repo's
      # Security → Code scanning tab. The SARIF scan is allowed to fail (a HIGH
      # makes the scan exit 1, suppressed with `|| true`) and the upload runs
      # unconditionally, so findings are reported even when the gating step
      # above turns the check red. This does NOT replace the exit-1 gate.
      - name: Scan PR diff (SARIF)
        if: always() && github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          promptshield scan --diff "origin/${{ github.base_ref }}" --format sarif > promptshield.sarif || true

      - name: Scan repository (SARIF)
        if: always() && github.event_name != 'pull_request'
        run: promptshield scan . --format sarif > promptshield.sarif || true

      - name: Upload SARIF to code-scanning
        if: always() && hashFiles('promptshield.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: promptshield.sarif
