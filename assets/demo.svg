      <stop offset="0" stop-color="#2b2b3a"/>
      <stop offset="1" stop-color="#22222e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="860" height="470" rx="10" fill="#1a1a24"/>
  <rect x="0" y="0" width="860" height="32" rx="10" fill="url(#bar)"/>
  <rect x="0" y="20" width="860" height="12" fill="#22222e"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="6" fill="#27c93f"/>
  <text x="430" y="20" text-anchor="middle" fill="#8a8a99">promptshield — scan code your agent reads</text>

  <text x="18" y="60" fill="#6b7280"># Your coding agent is about to read this repo. Scan it first.</text>
  <text x="18" y="84" fill="#9aa0a6">$ </text>
  <text x="34" y="84" fill="#e5e7eb">promptshield scan ./tests/fixtures/malicious_pr</text>

