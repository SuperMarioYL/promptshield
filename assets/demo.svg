  <!-- rows -->
  <rect x="18" y="150" width="56" height="17" rx="3" fill="#b91c1c"/>
  <text x="46" y="163" text-anchor="middle" fill="#ffffff" font-weight="bold">HIGH</text>
  <text x="86" y="163" fill="#e5e7eb">PS001-instruction-override</text>
  <text x="350" y="163" fill="#c084fc">instruction_override</text>
  <text x="600" y="163" fill="#9aa0a6">utils.py:11</text>

  <rect x="18" y="174" width="56" height="17" rx="3" fill="#b91c1c"/>
  <text x="46" y="187" text-anchor="middle" fill="#ffffff" font-weight="bold">HIGH</text>
  <text x="86" y="187" fill="#e5e7eb">PS010-destructive-shell</text>
  <text x="350" y="187" fill="#f59e0b">data_destructive</text>
  <text x="600" y="187" fill="#9aa0a6">utils.py:12</text>

  <rect x="18" y="198" width="56" height="17" rx="3" fill="#b91c1c"/>
  <text x="46" y="211" text-anchor="middle" fill="#ffffff" font-weight="bold">HIGH</text>
  <text x="86" y="211" fill="#e5e7eb">PS011-destructive-instruction</text>
  <text x="350" y="211" fill="#f59e0b">data_destructive</text>
  <text x="600" y="211" fill="#9aa0a6">utils.py:17</text>

  <rect x="18" y="222" width="56" height="17" rx="3" fill="#b91c1c"/>
  <text x="46" y="235" text-anchor="middle" fill="#ffffff" font-weight="bold">HIGH</text>
  <text x="86" y="235" fill="#e5e7eb">PS020-exfil-secrets</text>
  <text x="350" y="235" fill="#38bdf8">exfiltration</text>
