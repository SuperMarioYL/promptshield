  <text x="82" y="268" fill="#f3f4f6" font-weight="bold">31 surfaces</text>
  <text x="172" y="268" fill="#9ca3af"> · </text>
  <text x="190" y="268" fill="#f87171" font-weight="bold">8 HIGH</text>
  <text x="250" y="268" fill="#9ca3af"> · 0 MED · 0 LOW</text>
  <text x="18" y="290" fill="#f87171" font-weight="bold">✗ HIGH findings present — exit 1 (CI gate failed).</text>

  <text x="18" y="324" fill="#6b7280"># In CI, scan the PR JSON. A HIGH finding fails the check.</text>
  <text x="18" y="348" fill="#9aa0a6">$ </text>
  <text x="34" y="348" fill="#e5e7eb">promptshield scan --pr pr_files.json; echo "exit: $?"</text>
  <text x="18" y="372" fill="#f87171" font-weight="bold">✗ HIGH findings present — exit 1 (CI gate failed).</text>
  <text x="18" y="394" fill="#f59e0b" font-weight="bold">exit: 1</text>

